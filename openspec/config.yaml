schema: spec-driven

context: |
  ## 專案簡介
  PTCG EoR Tracker — 寶可夢卡牌 (PTCG) 賽事 End of Round 裁判桌次紀錄工具。
  裁判在宣告 EoR 後，使用此工具追蹤每張桌子的完賽狀態，並可標記加時桌。
  支援完全離線使用，以 PWA 形式安裝至手機桌面。

  ## 技術架構
  - 純 Vanilla HTML + CSS + JavaScript，無任何前端框架或打包工具
  - 單頁應用 (SPA)，三個畫面：setup-view（設定）、tracker-view（紀錄主畫面）、help-view（使用說明）
  - 資料持久化：localStorage
    - `ptcg_eor_tracker_state`：完整 state（輪次、組別、桌號範圍、各桌狀態）
    - `ptcg_eor_group`：上次輸入的組別（跨輪次記憶，input 事件即時寫入）
    - `ptcg_eor_range`：上次使用的桌號範圍 `{ start, end }`（開始紀錄時寫入，作為下一輪預設值）
    - `ptcg_eor_card_size`：每列桌次密度偏好（`lg` / `md` / `sm`，預設 `lg`）
  - PWA：Service Worker (`sw.js`) + Web App Manifest (`manifest.json`)
  - 字型：Google Fonts — Outfit、Noto Sans TC

  ## 狀態管理
  全域 `state` 物件：
  ```js
  {
    roundNumber: number,     // 輪次數字（1–20），顯示格式 R1、R2…
    group: string,           // 組別，例如 "大師A"
    startTable: number,
    endTable: number,
    tables: Array<{
      number: number,
      state: 'active' | 'assigned' | 'completed',
      assignedTime: string | null,   // "HH:MM" 格式
      overtimeMinutes: number | null
    }>
  }
  ```
  桌號狀態機：active → assigned（記錄分配時間）→ completed → active（點擊循環）
  長按桌號卡片（按住 0.5 秒）：開啟加時 popup，可設定 +3 / +6 / +9 或自訂分鐘數

  ## 組別選項
  組別為自由輸入文字欄位（必填），上次輸入的內容會被記住（`ptcg_eor_group`）

  ## UI 語言
  介面使用繁體中文 (zh-Hant)；程式碼變數與函式名稱使用英文

  ## 主要功能
  - 設定輪次（1–20，下一輪自動 +1）、組別、桌號範圍後開始紀錄；組別與桌號範圍會記住上次輸入作為預設值
  - 桌號卡片顯示狀態（尚未結束 / 已分配 / 已完成）與加時標記；長按卡片設定加時分鐘數
  - 加時徽章顏色依加時長度分三級：≤3 分（深金黃）、4–6 分（深琥珀橘）、>6 分（紅色）
  - 進度條與統計數字（已完成 N / 總計 M 桌）
  - 每列桌次密度調整（+ / − 按鈕，三段：lg / md / sm，偏好存 localStorage）
  - 篩選：隱藏已完成桌、只顯示加時桌（兩者可複合套用，AND 邏輯）
  - 範圍篩選標籤：桌次超過 25 桌時自動顯示分段標籤，可快速聚焦特定桌次區段；括號內顯示該區段未完成桌數
  - 批量設為已完成（格線選取模式：點選桌次 / 全選未完成 / 清除全選 / 反選；批次模式有獨立的 compact 資訊列與篩選器）
  - 複製資訊到剪貼簿（本輪範圍 / 加時桌次 / 剩餘桌次 / 詳細資訊）
  - 桌號搜尋（🔍 開啟數字鍵盤彈窗，輸入後按「確定」跳轉並高亮；目標被篩選隱藏時彈出確認視窗；高亮 1 秒後消失）
  - 復原 / 重做（最多 20 步，批量操作亦可一步還原；不持久化，重新整理後清除）
  - 確認本輪完畢 / 強制結束本輪（均重置狀態並返回設定畫面）
  - 使用說明畫面（help-view，從設定畫面進入）
  - 在線/離線狀態顯示

  ## 程式碼慣例
  - 所有 DOM 元素在模組頂部一次性 querySelector，不在函式內重複查找
  - 渲染邏輯集中在 `renderTracker()`，修改 state 後呼叫即可
  - Commit message 使用 Conventional Commits (feat / fix / chore / refactor)
  - 不使用任何 CSS 框架，樣式以 CSS 變數為設計 token

rules:
  proposal:
    - 說明對使用者操作流程的影響
    - 若涉及 PWA 快取，需提及 sw.js 是否需要更新版本號
  tasks:
    - 每個 task 限定在單一檔案或單一功能範疇內
    - 若需新增 UI 元素，task 需分為「HTML 結構」、「CSS 樣式」、「JS 邏輯」三步
